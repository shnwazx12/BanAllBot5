services:
  - type: web
    name: hidden-entry-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: MONGO_URL
        sync: false
      - key: RENDER_URL
        sync: false
      - key: PORT
        value: "3000"
